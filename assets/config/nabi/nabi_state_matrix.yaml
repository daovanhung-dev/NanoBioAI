schema_version: "1.0.0"
character_id: "nabi"
selection_priority:
  - "critical_system"
  - "onboarding"
  - "task_result"
  - "daily_context"
  - "engagement"
  - "default"
states:
  - id: "default_idle"
    asset: "assets/images/nabi/core/nabi_idle_neutral.png"
    when: "No higher-priority state applies"
    tone: "Ấm áp, yên tĩnh"
    motion: "idle_breathe"
  - id: "welcome"
    asset: "assets/images/nabi/core/nabi_wave.png"
    when: "App first open / welcome view"
    tone: "Chào đón, dịu dàng"
    motion: "wave"
  - id: "ai_listening"
    asset: "assets/images/nabi/chat/nabi_chat_listen.png"
    when: "User is composing or has just sent a chat message"
    tone: "Lắng nghe, tinh tế"
    motion: "listen"
  - id: "ai_generating"
    asset: "assets/images/nabi/onboarding/nabi_ai_generating_plan.png"
    when: "AI request is in progress"
    tone: "Bình tĩnh, minh bạch"
    motion: "analyze"
  - id: "task_done"
    asset: "assets/images/nabi/progress/nabi_task_complete.png"
    when: "Task was completed"
    tone: "Công nhận, tích cực"
    motion: "celebrate"
  - id: "task_skipped"
    asset: "assets/images/nabi/progress/nabi_task_skip_gentle.png"
    when: "Task was skipped"
    tone: "Không phán xét, dịu dàng"
    motion: "calm"
  - id: "away_3d"
    asset: "assets/images/nabi/engagement/nabi_away_3days.png"
    when: "Last app open is 3 to 6 days ago"
    tone: "Gợi mở, không phán xét"
    motion: "think"
  - id: "welcome_back"
    asset: "assets/images/nabi/engagement/nabi_welcome_back.png"
    when: "User returns after 7+ inactive days"
    tone: "Ấm áp, chào mừng"
    motion: "wave"
  - id: "offline"
    asset: "assets/images/nabi/system/nabi_offline.png"
    when: "Network unavailable"
    tone: "Trấn an, ngắn gọn"
    motion: "calm"
  - id: "sync_success"
    asset: "assets/images/nabi/system/nabi_sync_success.png"
    when: "Sync operation succeeds"
    tone: "Rõ ràng, tích cực"
    motion: "celebrate"
engagement_bands:
  - id: "new"
    condition: "account_age_days <= 3 OR total_active_days <= 2"
    asset: "assets/images/nabi/engagement/nabi_new_user.png"
    tone: "chào đón, dịu dàng"
  - id: "occasional"
    condition: "opens_per_week in [1,2]"
    asset: "assets/images/nabi/engagement/nabi_occasional_user.png"
    tone: "gợi mở, thân thiện"
  - id: "regular"
    condition: "opens_per_week in [3,5]"
    asset: "assets/images/nabi/engagement/nabi_regular_user.png"
    tone: "khích lệ, công nhận"
  - id: "daily"
    condition: "opens_per_week >= 6"
    asset: "assets/images/nabi/engagement/nabi_daily_user.png"
    tone: "thân quen, chủ động vừa đủ"
  - id: "away_1d"
    condition: "days_since_last_open == 1"
    asset: "assets/images/nabi/engagement/nabi_away_1day.png"
    tone: "nhẹ nhàng"
  - id: "away_3d"
    condition: "days_since_last_open between 3 and 6"
    asset: "assets/images/nabi/engagement/nabi_away_3days.png"
    tone: "không phán xét"
  - id: "away_7d"
    condition: "days_since_last_open between 7 and 13"
    asset: "assets/images/nabi/engagement/nabi_away_7days.png"
    tone: "ấm áp, không trách móc"
  - id: "away_14d"
    condition: "days_since_last_open >= 14"
    asset: "assets/images/nabi/engagement/nabi_away_14days.png"
    tone: "tôn trọng, không thúc ép"
